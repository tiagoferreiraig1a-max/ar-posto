<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Estilo para o botão que fica por cima da câmara */
      .button-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        z-index: 999;
        text-align: center;
      }
      .btn-link {
        padding: 15px 25px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 30px;
        text-decoration: none;
        font-family: Arial, sans-serif;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <div class="button-container">
      <a href="https://TEU-LINK-AQUI.pdf" target="_blank" class="btn-link">
        Abrir Manual ou Formulário
      </a>
    </div>

    <a-scene embedded arjs>
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" material="opacity: 0.8; color: #28a745;" scale="1.5 0.5 0.1"></a-box>
        <a-text value="POSTO ATIVO\nClique abaixo para o Manual" 
                position="-0.7 0.5 0.1" color="white" width="3.5"></a-text>
        
        <a-sphere position="0 1.2 0" radius="0.1" color="red"
                  animation="property: position; to: 0 1.4 0; dir: alternate; dur: 1000; loop: true">
        </a-sphere>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
