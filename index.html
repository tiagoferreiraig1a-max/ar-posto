<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .ui-container {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 90%; z-index: 9999; display: flex; justify-content: space-between;
      }
      .btn {
        padding: 15px 10px; background: #0054a6; color: white !important; border-radius: 8px;
        text-decoration: none; font-family: sans-serif; font-weight: bold;
        font-size: 12px; border: 2px solid white; width: 48%; text-align: center;
      }
      .btn-risk { background: #d32f2f; }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div class="ui-container">
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQBZ4crRwZi5SaPNlrUXaOALAVlLRyl3zO363RnZ_VMHLwY?e=VBQuEb" class="btn">📄 PROCESSO</a>
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQA9Uee78FoEQ72zJRhF0MdPAVxAdLq_bJMxkuiPU3iWaks?e=HWBJTo" class="btn btn-risk">⚠️ RISCOS</a>
    </div>

    <a-scene embedded arjs="debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clicavel">
      
      <a-assets>
        <img id="tabela-risco" src="tabela_lectra.png">
      </a-assets>

      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0">
          
          <a-entity id="main-panel">
            <a-plane position="0 1.2 0.01" width="3.5" height="0.7" color="#1a1a1a"></a-plane>
            <a-text value="LECTRA FX" position="0 1.3 0.1" align="center" width="8" color="#FFD700"></a-text>
          </a-entity>

          <a-entity id="tabela-container" class="clicavel" position="3.2 1.2 0.2">
            
            <a-image id="imagem-risco" src="#tabela-risco" width="3" height="2.2" position="0 0 0.1"></a-image>
            
            <a-plane width="3.2" height="2.4" position="0 0 0.05" opacity="0.4" color="#d32f2f"></a-plane>

            <a-text value="CLIQUE PARA ZOOM" position="0 -1.3 0.1" align="center" width="4" color="#FFF"></a-text>
          </a-entity>

        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const tabela = document.querySelector('#tabela-container');
      const mainPanel = document.querySelector('#main-panel');
      let zoomed = false;

      // Função única para lidar com a animação
      function toggleZoom() {
        if (!zoomed) {
          // ZOOM IN
          tabela.setAttribute('animation', 'property: position; to: 0 1.2 1.5; dur: 500; easing: easeOutQuad');
          tabela.setAttribute('animation__scale', 'property: scale; to: 1.8 1.8 1.8; dur: 500');
          mainPanel.setAttribute('visible', 'false');
          zoomed = true;
        } else {
          // ZOOM OUT
          tabela.setAttribute('animation', 'property: position; to: 3.2 1.2 0.2; dur: 500; easing: easeOutQuad');
          tabela.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 500');
          mainPanel.setAttribute('visible', 'true');
          zoomed = false;
        }
      }

      // IMPORTANTE: Escutar tanto click quanto touch para telemóveis
      tabela.addEventListener('click', toggleZoom);
      tabela.addEventListener('touchstart', function(e) {
        e.preventDefault(); // Impede o scroll do browser ao tocar
        toggleZoom();
      });
    </script>
  </body>
</html>
