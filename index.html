<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .button-container {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        z-index: 999; width: 80%; text-align: center;
      }
      .btn-link {
        padding: 20px; background: #007bff; color: white; border-radius: 10px;
        text-decoration: none; font-family: sans-serif; font-weight: bold; display: block;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <div class="button-container">
      <a href="#" class="btn-link">ABRIR MANUAL TÉCNICO</a>
    </div>

    <a-scene embedded arjs="debugUIEnabled: false;">
      <a-marker preset="hiro">
        
        <a-plane position="0 1 0" rotation="0 0 0" width="2.5" height="1.2" color="#000"></a-plane>
        
        <a-text value="INFO POSTO A1\nESTADO: OPERACIONAL" 
                position="0 1 0.1" rotation="0 0 0" color="#00FF00" 
                align="center" width="6" font="mozillavr"></a-text>

        <a-sphere position="0 1.8 0" radius="0.1" color="blue"
                  animation="property: scale; to: 1.5 1.5 1.5; dir: alternate; dur: 500; loop: true">
        </a-sphere>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
