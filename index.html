<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lectra FX - Interface Dinâmica</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Alterado para display: none por padrão */
      .ui-container {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 90%; z-index: 9999; display: none; justify-content: space-between;
      }
      .btn {
        padding: 15px 10px; background: #0054a6; color: white !important; border-radius: 8px;
        text-decoration: none; font-family: sans-serif; font-weight: bold;
        font-size: 11px; border: 2px solid white; width: 46%; text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        text-transform: uppercase;
      }
      #instrucao {
        position: fixed; top: 10px; width: 100%; text-align: center;
        color: white; font-family: sans-serif; z-index: 10000;
        text-shadow: 2px 2px 4px #000; font-weight: bold; font-size: 14px;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div id="instrucao">A PROCURAR LOGOTIPO LECTRA...</div>

    <div id="botoes-ar" class="ui-container">
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQBZ4crRwZi5SaPNlrUXaOALAVlLRyl3zO363RnZ_VMHLwY?e=VBQuEb" target="_blank" class="btn">📄 PROCESSO</a>
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQA9Uee78FoEQ72zJRhF0MdPAVxAdLq_bJMxkuiPU3iWaks?e=HWBJTo" target="_blank" class="btn" style="background: #d32f2f;">⚠️ RISCOS</a>
    </div>

    <a-scene 
      embedded 
      arjs="trackingMethod: best; debugUIEnabled: false; smooth: true; smoothCount: 15; smoothThreshold: 5;" 
      renderer="logarithmicDepthBuffer: true; antialias: true; precision: high;"
      cursor="rayOrigin: mouse" 
      raycaster="objects: .clicavel">
      
      <a-assets>
        <img id="tabela-risco" src="tabela_lectra.png" crossorigin="anonymous">
      </a-assets>

      <a-marker type="pattern" url="pattern-Lectra-Logo-300x150.patt" id="marcador">
        
        <a-entity id="conteudo-principal" rotation="-90 0 0" visible="false">
          
          <a-entity id="main-panel">
            <a-plane position="0 2.1 0.01" width="3" height="0.5" color="#1a1a1a" opacity="0.9"></a-plane>
            <a-text value="LECTRA FX" position="0 2.1 0.1" align="center" width="7" color="#FFD700"></a-text>
          </a-entity>

          <a-entity id="tabela-container" class="clicavel" position="0 0.2 0.2">
            <a-text value="Maior Risco associado" position="0 1.3 0.1" align="center" width="4.5" color="#FF3333"></a-text>
            <a-plane width="3.2" height="2.8" opacity="0" class="clicavel"></a-plane>
            <a-image src="#tabela-risco" width="2.9" height="2.1" position="0 0 0.1"></a-image>
            <a-rect width="3.0" height="2.2" position="0 0 0.05" color="#d32f2f" opacity="0.6"></a-rect>
            <a-text value="TOQUE PARA ZOOM" position="0 -1.2 0.1" align="center" width="3.2" color="#FFF"></a-text>
          </a-entity>

          <a-sphere position="1.3 2.1 0.2" radius="0.07" color="#00ff00"
                    material="emissive: #00ff00; emissiveIntensity: 1"
                    animation="property: material.emissiveIntensity; from: 0.5; to: 2; dir: alternate; dur: 800; loop: true">
          </a-sphere>

        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marcador = document.querySelector('#marcador');
      const conteudo = document.querySelector('#conteudo-principal');
      const tabela = document.querySelector('#tabela-container');
      const mainPanel = document.querySelector('#main-panel');
      const instrucao = document.querySelector('#instrucao');
      const containerBotoes = document.querySelector('#botoes-ar');
      let zoomed = false;

      // Quando o marcador é encontrado
      marcador.addEventListener('markerFound', () => {
        conteudo.setAttribute('visible', 'true');
        conteudo.setAttribute('scale', '1 1 1'); 
        instrucao.innerText = "LECTRA FX DETETADA";
        instrucao.style.color = "#00ff00";
        
        // MOSTRAR BOTOES
        containerBotoes.style.display = 'flex';
      });

      // Quando o marcador é perdido
      marcador.addEventListener('markerLost', () => {
        conteudo.setAttribute('visible', 'false');
        instrucao.innerText = "A PROCURAR LOGOTIPO LECTRA...";
        instrucao.style.color = "white";
        
        // ESCONDER BOTOES
        containerBotoes.style.display = 'none';
        
        if(zoomed) { resetZoom(); }
      });

      function resetZoom() {
          tabela.removeAttribute('animation__zoom');
          tabela.removeAttribute('animation__scalesize');
          tabela.setAttribute('position', '0 0.2 0.2');
          tabela.setAttribute('scale', '1 1 1');
          mainPanel.setAttribute('visible', 'true');
          zoomed = false;
      }

      function executarZoom() {
        if (!zoomed) {
          tabela.setAttribute('animation__zoom', 'property: position; to: 0 0.6 1.1; dur: 450; easing: easeOutQuad');
          tabela.setAttribute('animation__scalesize', 'property: scale; to: 1.15 1.15 1.15; dur: 450');
          mainPanel.setAttribute('visible', 'false');
          zoomed = true;
        } else {
          resetZoom();
        }
      }

      tabela.addEventListener('mousedown', executarZoom);
      tabela.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        executarZoom(); 
      });
    </script>
  </body>
</html>
