<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <a-scene 
      embedded 
      arjs="debugUIEnabled: false;" 
      cursor="rayOrigin: mouse" 
      raycaster="objects: .clicavel">
      
      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0">
          
          <a-entity id="robot" class="clicavel" position="0 1 0.5">
            
            <a-box width="0.6" height="0.6" depth="0.6" color="#0054a6"
                   animation__click="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dur: 150; startEvents: click">
              <a-text value="TOCA AQUI" position="0 0.5 0.35" align="center" width="4" color="white"></a-text>
            </a-box>
            
            <a-cylinder position="0 -0.5 0" radius="0.2" height="0.7" color="#333"></a-cylinder>
          </a-entity>

          <a-text id="mensagem" value="CLICA NO ROBOT" position="0 2.2 0.1" align="center" width="5" color="yellow"></a-text>

        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const robot = document.querySelector('#robot');
      const mensagem = document.querySelector('#mensagem');

      // Função para mudar o estado
      function dispararInteracao() {
        const cores = ['#FF5733', '#33FF57', '#3357FF', '#F333FF'];
        const corRandom = cores[Math.floor(Math.random() * cores.length)];
        
        // Seleciona a caixa do robot e muda a cor
        robot.querySelector('a-box').setAttribute('color', corRandom);
        
        // Atualiza o texto
        mensagem.setAttribute('value', 'MAQUINA OK! (SINAL RECEBIDO)');
        mensagem.setAttribute('color', '#00ff00');
        
        console.log("Toque detetado com sucesso!");
      }

      // Escuta tanto cliques de rato como toques no ecrã
      robot.addEventListener('click', dispararInteracao);
      robot.addEventListener('touchstart', dispararInteracao);
    </script>
  </body>
</html>
