<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Layout dos Botões no Fundo */
      .ui-container {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 90%; z-index: 9999; display: flex; justify-content: space-between;
      }
      .btn {
        padding: 15px 10px; background: #0054a6; color: white !important; border-radius: 8px;
        text-decoration: none; font-family: sans-serif; font-weight: bold;
        font-size: 12px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        width: 48%; text-align: center;
      }
      .btn-risk { background: #d32f2f; }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <div class="ui-container">
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQBZ4crRwZi5SaPNlrUXaOALAVlLRyl3zO363RnZ_VMHLwY?e=VBQuEb" target="_blank" class="btn">📄 PROCESSO</a>
      <a href="https://siemensenergyag-my.sharepoint.com/:b:/g/personal/tiago_pinhal_siemens-energy_com/IQA9Uee78FoEQ72zJRhF0MdPAVxAdLq_bJMxkuiPU3iWaks?e=HWBJTo" target="_blank" class="btn btn-risk">⚠️ RISCOS</a>
    </div>

    <a-scene embedded arjs="debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clicavel">
      
      <a-assets>
        <img id="tabela-risco" src="tabela_lectra.png">
      </a-assets>

      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0">
          
          <a-entity id="main-panel">
            <a-plane position="0 1.2 0" width="3.5" height="0.7" color="#1a1a1a" opacity="0.9"></a-plane>
            <a-text value="LECTRA FX" position="0 1.3 0.1" align="center" width="8" color="#FFD700"></a-text>
            <a-text value="CORTE DE FIBRA SECA" position="0 0.9 0.1" align="center" width="4" color="#FFFFFF"></a-text>
          </a-entity>

          <a-entity id="tabela-container" class="clicavel" position="3.2 1.2 0.1">
            <a-text value="MAIOR RISCO" position="0 1.3 0.1" align="center" width="5" color="#d32f2f"></a-text>
            
            <a-image id="imagem-risco" src="#tabela-risco" width="3" height="2.2" position="0 0 0.05"
                     animation="property: scale; from: 1 1 1; to: 1.03 1.03 1.03; dir: alternate; dur: 1500; loop: true">
            </a-image>
            
            <a-rect width="3.1" height="2.3" position="0 0 0.01" color="#d32f2f" opacity="0.4"></a-rect>
          </a-entity>

          <a-sphere position="0 1.9 0.2" radius="0.08" color="#00ff00"
                    material="emissive: #00ff00; emissiveIntensity: 1"
                    animation="property: material.emissiveIntensity; from: 0.5; to: 2; dir: alternate; dur: 800; loop: true">
          </a-sphere>

        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const tabela = document.querySelector('#tabela-container');
      const mainPanel = document.querySelector('#main-panel');
      let zoomed = false;

      tabela.addEventListener('click', function () {
        if (!zoomed) {
          // ENTRAR EM ZOOM: Move para o centro e aumenta
          this.setAttribute('animation', 'property: position; to: 0 1.2 1; dur: 500; easing: easeInOutQuad');
          this.setAttribute('animation__scale', 'property: scale; to: 1.5 1.5 1.5; dur: 500');
          mainPanel.setAttribute('visible', 'false'); // Esconde o título para não atrapalhar
          zoomed = true;
        } else {
          // SAIR DO ZOOM: Volta para a lateral
          this.setAttribute('animation', 'property: position; to: 3.2 1.2 0.1; dur: 500; easing: easeInOutQuad');
          this.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 500');
          mainPanel.setAttribute('visible', 'true');
          zoomed = false;
        }
      });
    </script>
  </body>
</html>
