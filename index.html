<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .interativo">
      
      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0">
          
          <a-entity id="robot" class="interativo" position="0 1 0.5"
                    animation__click="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dur: 200; startEvents: click; dir: alternate; loop: 1">
            
            <a-box width="0.5" height="0.5" depth="0.5" color="#0054a6">
              <a-text value="TOCA-ME" position="0 0.4 0.3" align="center" width="3"></a-text>
            </a-box>
            
            <a-cylinder position="0 -0.4 0" radius="0.2" height="0.6" color="#333"></a-cylinder>
          </a-entity>

          <a-text id="feedback" value="AGUARDANDO INTERACAO" position="0 2 0.1" align="center" width="4"></a-text>

        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Lógica para mudar a cor quando clicas
      const robot = document.querySelector('#robot');
      const feedback = document.querySelector('#feedback');

      robot.addEventListener('click', function () {
        // Mudar cor para uma cor aleatória
        const cores = ['#ff0000', '#00ff00', '#ffaa00', '#ffffff'];
        const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
        
        this.querySelector('a-box').setAttribute('color', corAleatoria);
        feedback.setAttribute('value', 'INTERACAO DETETADA!');
        feedback.setAttribute('color', corAleatoria);
      });
    </script>
  </body>
</html>
