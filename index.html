<!DOCTYPE html>
<html>

    <style>

      .btn-link {

        display: block; border: 2px solid #ffffff;
      }
    </style>
  </head>

        📖 Descrição do processo

    <a-scene embedded arjs="debugUIEnabled: false;">

          </a-sphere>

          <a-plane position="0 0.3 0.02" width="3.6" height="0.3" color="#ff6600"></a-plane>
          <a-text value="AVISO: MANTER PROTECAO DE DEDOS ATIVA" 
                  position="0 0.3 0.05" color="#fff" align="center" width="3.5"></a-text>
