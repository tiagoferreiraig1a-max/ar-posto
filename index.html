<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="debugUIEnabled: false; trackingMethod: best; smooth: true; smoothCount: 10;" 
             renderer="logarithmicDepthBuffer: true;">
      
      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0">
          
          <a-plane position="0 1.2 0" width="3.5" height="2" color="#1a1a1a" opacity="0.9"></a-plane>

          <a-entity id="robot-assistente" 
                    position="1.8 1.2 0.5" 
                    look-at="[camera]"
                    animation="property: position; from: 1.8 1.1 0.5; to: 1.8 1.3 0.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
            
            <a-box width="0.4" height="0.4" depth="0.4" color="#0054a6">
              <a-sphere position="-0.1 0.1 0.21" radius="0.05" color="#00ff00"></a-sphere>
              <a-sphere position="0.1 0.1 0.21" radius="0.05" color="#00ff00"></a-sphere>
              <a-cylinder position="0 0.3 0" radius="0.01" height="0.2" color="#ccc"></a-cylinder>
            </a-box>
            <a-cylinder position="0 -0.4 0" radius="0.2" height="0.5" color="#333"></a-cylinder>
          </a-entity>

          <a-text value="SISTEMA INTERATIVO ATIVO\nO ROBOT ESTA A MONITORIZAR" position="0 1.2 0.1" align="center" width="4"></a-text>

        </a-entity>
      </a-marker>
      
      <a-entity camera id="camera"></a-entity>
    </a-scene>
  </body>
</html>
