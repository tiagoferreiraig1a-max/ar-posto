<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .button-container {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 999; text-align: center; width: 80%;
      }
      .btn-link {
        padding: 15px 25px; background-color: #007bff; color: white;
        border: none; border-radius: 30px; text-decoration: none;
        font-family: Arial, sans-serif; font-weight: bold; display: inline-block;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <div class="button-container">
      <a href="#" class="btn-link">Ver Documentação</a>
    </div>

    <a-scene embedded arjs>
      <a-marker preset="hiro">
        <a-plane position="0 0.5 0" rotation="-90 0 0" width="2" height="1" color="#28a745" opacity="0.9"></a-plane>
        
        <a-text value="POSTO ATIVO\n\nManutencao OK\nRamal: 1234" 
                position="0 0.6 0" rotation="-90 0 0" color="white" align="center" width="4"></a-text>
        
        <a-sphere position="0 1.2 0" radius="0.15" color="yellow"
                  animation="property: position; to: 0 1.5 0; dir: alternate; dur: 1000; loop: true">
        </a-sphere>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
